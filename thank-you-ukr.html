          <script>
document.addEventListener('DOMContentLoaded', () => {
  // Знаходимо форму й елементи
  const form      = document.querySelector('form.my-form-copy');
  const checkboxes = form.querySelectorAll('label.required-checkbox input[type="checkbox"]');
  const errorEl    = form.querySelector('.checkbox-error');
  const submitBtn  = form.querySelector('[type="submit"]');
  // Функція показу помилки з анімацією зникнення
  const showError = () => {
    // Показуємо елемент
    errorEl.classList.remove('hidden');
    errorEl.style.display   = 'block';
    errorEl.style.opacity   = '1';
    errorEl.style.transition = ''; // скидаємо попередні transition
    // Через 3.5 секунди починаємо фейд-аут (0.5s)
    setTimeout(() => {
      errorEl.style.transition = 'opacity 0.5s ease';
      errorEl.style.opacity    = '0';
    }, 3500);
    // Через 4 секунди ховаємо остаточно
    setTimeout(() => {
      errorEl.style.display    = 'none';
      // скидаємо inline-стилі, щоб при наступному showError було чисто
      errorEl.style.opacity    = '';
      errorEl.style.transition = '';
      errorEl.classList.add('hidden');
    }, 4000);
  };
  // Перехоплюємо click у capture-фазі
  submitBtn.addEventListener('click', e => {
    const valid = Array.from(checkboxes).some(cb => cb.checked);
    if (!valid) {
      e.preventDefault();
      e.stopImmediatePropagation();
      showError();
    }
  }, true);
  // Остання перевірка перед submit
  form.addEventListener('submit', e => {
    const valid = Array.from(checkboxes).some(cb => cb.checked);
    if (!valid) {
      e.preventDefault();
      showError();
    }
  });
});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function () {
  // Run check on every form
  document.querySelectorAll("form").forEach(function (form) {
    form.addEventListener("submit", function (e) {
      const emailField = form.querySelector("input[type='email']");
      if (emailField) {
        // Regex: exactly 5 digits right before @
        const regex = /\d{5}@/;
        if (regex.test(emailField.value)) {
          e.preventDefault(); // Stop form submission
          alert("Invalid email detected. Please enter a valid email address.");
          emailField.focus();
          return false;
        }
      }
    });
  });
});
</script>
